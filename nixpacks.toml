[phases.build]
cmds = [
  "npm install",
  "npm run build",
  "composer install --no-dev --optimize-autoloader",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs && chmod -R 775 storage && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"